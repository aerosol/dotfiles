# wob configuration for wlbt
# Nice modern styling with rounded appearance

# Timing
timeout = 2000

# Dimensions - sleek horizontal bar
width = 300
height = 30
max = 100

# Positioning - bottom center
anchor = bottom center
margin = 50

# Border styling - rounded appearance
border_offset = 2
border_size = 2
bar_padding = 4

# Colors - dark theme with blue accent
background_color = 1e1e2e88
border_color = 585b7088
bar_color = 89b4fa
overflow_mode = nowrap

# Orientation
orientation = horizontal

# Style for brightness (warmer color)
[style.brightness]
bar_color = f9e2af
background_color = 1e1e2e88
border_color = 585b7088

# Style for temperature (cooler/warmer gradient concept)
[style.temperature]
bar_color = 94e2d5
background_color = 1e1e2e88
border_color = 585b7088