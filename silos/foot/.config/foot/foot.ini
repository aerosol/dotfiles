include=~/.config/foot/theme.ini

# … your normal foot config …
# -*- conf -*-
font=PragmataPro:size=8
font-bold=JetBrains Mono NL NerdFont:size=8
font-bold=JetBrains Mono NL NerdFont:size=8
font-italic=JetBrains Mono NL NerdFont:size=8
font-bold-italic=JetBrains Mono NL NerdFont:size=8
line-height=11

shell=/bin/zsh
term=xterm-256color
login-shell=yes
